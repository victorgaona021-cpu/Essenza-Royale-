<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sillage — Fragancias Masculinas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0A0A0A;
  --white:#FAFAFA;
  --gray:#F2F2F0;
  --border:#E8E8E6;
  --text:#111;
  --muted:#888;
  --gold:#B8962E;
  --tag-fresh-bg:#EBF4FB;--tag-fresh:#1A6FA8;
  --tag-citrus-bg:#FFF3E0;--tag-citrus:#C45000;
  --tag-sweet-bg:#FDF0F8;--tag-sweet:#9B1D6A;
  --tag-wood-bg:#F0EDE6;--tag-wood:#5C4A1E;
  --tag-frutal-bg:#F0FAF0;--tag-frutal:#1A7A3A;
  --tag-floral-bg:#FDF4FF;--tag-floral:#7A1A9A;
  --tag-spice-bg:#FFF8EC;--tag-spice:#8A4A00;
  --tag-arab-bg:#FFFAEC;--tag-arab:#8A7000;
  --tag-lujo-bg:#F8F0FF;--tag-lujo:#5A1A8A;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  background:var(--white);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overscroll-behavior:none;
}

/* ── HERO ── */
.hero{
  background:var(--black);
  color:#fff;
  padding:36px 20px 30px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,transparent 1px,transparent 60px),
             repeating-linear-gradient(0deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,transparent 1px,transparent 60px);
}
.hero-inner{position:relative;z-index:1}
.hero-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:52px;
  letter-spacing:0.12em;
  line-height:1;
  margin-bottom:4px;
}
.hero-logo span{color:var(--gold)}
.hero-tagline{
  font-size:11px;letter-spacing:0.22em;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
  margin-bottom:16px;
}
.hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hero-pill{
  font-size:11px;padding:5px 12px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;color:rgba(255,255,255,0.6);
}
.hero-pill strong{color:#fff;font-weight:500}

/* ── STICKY NAV ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(250,250,250,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.search-row{padding:10px 14px 0}
.search-box{
  position:relative;
}
.search-box input{
  width:100%;
  padding:11px 14px 11px 40px;
  border:1.5px solid var(--border);
  border-radius:10px;
  background:var(--gray);
  font-family:'Outfit',sans-serif;
  font-size:15px;
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.search-box input::placeholder{color:var(--muted)}
.search-box input:focus{border-color:var(--black);background:#fff}
.search-box svg{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;
  stroke-linecap:round;pointer-events:none;
}

.filters{
  display:flex;gap:6px;overflow-x:auto;
  padding:10px 14px 10px;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:7px 14px;
  border-radius:8px;border:1.5px solid var(--border);
  background:#fff;color:#333;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.chip.active{background:var(--black);border-color:var(--black);color:#fff;font-weight:700}
.chip:active{transform:scale(0.96)}

/* ── STATS ── */
.stats{
  padding:8px 16px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.stats-left{font-size:12px;color:var(--muted)}
.stats-left strong{color:var(--text);font-weight:600}
.stats-sort{
  font-size:11px;color:var(--muted);
  background:none;border:1px solid var(--border);
  padding:4px 10px;border-radius:6px;
  font-family:'Outfit',sans-serif;cursor:pointer;
}

/* ── GRID ── */
main{padding:0 12px 80px;max-width:1400px;margin:0 auto}
#grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media(min-width:600px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){#grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1200px){#grid{grid-template-columns:repeat(5,1fr)}}

/* ── CARD ── */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition:transform .15s;
}
.card:active{transform:scale(0.97)}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card-img{
  background:var(--gray);
  width:100%;
  height:150px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.card-img-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
}
.card-img-initials{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  color:rgba(0,0,0,0.12);
  letter-spacing:0.05em;
}
.card-img-sub{
  font-size:8px;letter-spacing:0.15em;
  color:rgba(0,0,0,0.2);text-transform:uppercase;
}
.card-img img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  padding:8px;
  z-index:1;
  background:var(--gray);
}

.card-body{padding:8px 10px 10px;min-height:0}
.card-marca{
  font-size:9px;letter-spacing:0.10em;
  color:#333;font-weight:700;
  text-transform:uppercase;margin-bottom:3px;
}
.card-nombre{
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;letter-spacing:0.04em;
  color:var(--text);line-height:1.15;
  margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tag{
  font-size:11px;padding:4px 9px;border-radius:6px;font-weight:500;
  white-space:nowrap;
}
.tag-fresco{background:var(--tag-fresh-bg);color:var(--tag-fresh)}
.tag-citrico{background:var(--tag-citrus-bg);color:var(--tag-citrus)}
.tag-dulce{background:var(--tag-sweet-bg);color:var(--tag-sweet)}
.tag-amaderado{background:var(--tag-wood-bg);color:var(--tag-wood)}
.tag-frutal{background:var(--tag-frutal-bg);color:var(--tag-frutal)}
.tag-floral{background:var(--tag-floral-bg);color:var(--tag-floral)}
.tag-especiado{background:var(--tag-spice-bg);color:var(--tag-spice)}
.tag-arabe{background:var(--tag-arab-bg);color:var(--tag-arab)}
.tag-lujo{background:var(--tag-lujo-bg);color:var(--tag-lujo)}

.card-footer{display:flex;align-items:flex-end;justify-content:space-between}
.card-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:0.04em;
  color:var(--text);line-height:1;
}
.card-price-sub{font-size:9px;color:var(--muted);margin-top:1px}
.card-ml{
  font-size:10px;color:var(--muted);
  background:var(--gray);
  padding:3px 7px;border-radius:6px;
  font-weight:500;
}

/* ── EMPTY ── */
.empty{
  grid-column:1/-1;
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:14px}

/* ── WA FLOAT ── */
.wa-btn{
  position:fixed;bottom:72px;right:14px;z-index:200;
  background:#25D366;color:#fff;
  border:none;border-radius:50px;
  padding:13px 18px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 20px rgba(37,211,102,0.4);
  text-decoration:none;letter-spacing:0.01em;
}
.wa-btn svg{width:18px;height:18px;fill:white;flex-shrink:0}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:#fff;border-radius:20px 20px 0 0;
  width:100%;max-width:480px;padding:24px 20px 40px;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-marca{font-size:10px;letter-spacing:0.16em;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.modal-nombre{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.06em;margin-bottom:4px}
.modal-version{font-size:13px;color:var(--muted);margin-bottom:12px}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal-price{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.04em;margin-bottom:4px}
.modal-price-note{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-wa{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#25D366;color:#fff;
  border:none;border-radius:12px;padding:15px;width:100%;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;text-decoration:none;
}
.modal-wa svg{width:20px;height:20px;fill:white}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:var(--gray);border:none;border-radius:50%;
  width:32px;height:32px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
}
.modal-wrap{position:relative}

.featured-section{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:14px 0 16px;
}
.featured-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 16px;margin-bottom:12px;
}
.featured-title{font-size:14px;font-weight:700;color:var(--text)}
.featured-sub{font-size:11px;color:var(--muted)}
.featured-scroll{
  display:flex;gap:10px;
  overflow-x:auto;padding:0 16px;
  scrollbar-width:none;
}
.featured-scroll::-webkit-scrollbar{display:none}
.feat-card{
  flex-shrink:0;width:120px;
  background:var(--gray);
  border-radius:12px;overflow:hidden;
  cursor:pointer;border:1px solid var(--border);
  transition:transform .15s;
}
.feat-card:active{transform:scale(0.96)}
.feat-img{
  width:120px;height:100px;
  background:var(--gray);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.feat-initials{
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;color:rgba(0,0,0,0.15);
}
.feat-img img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  padding:6px;
  z-index:1;
  background:var(--gray);
}
.feat-body{padding:8px 8px 10px}
.feat-marca{font-size:8px;letter-spacing:0.12em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:2px}
.feat-nombre{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;color:var(--text);line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:4px;
}
.feat-price{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text)}

</style>
</head>

const FEATURED=[90, 110, 228, 162, 284, 170, 219, 282, 118, 57];
const AROMA_CLASS={"Fresco": "fresco", "Cítrico": "citrico", "Dulce": "dulce", "Amaderado": "amaderado", "Frutal": "frutal", "Floral": "floral", "Especiado": "especiado"};

function fmt(n){return '$'+n.toLocaleString('es-MX')}
function initials(m){const w=m.split(/\s+/);return w.length>1?(w[0][0]+w[1][0]).toUpperCase():m.substring(0,2).toUpperCase()}
function cleanName(n){return n.replace(/\s*\d+\s*ML\b.*$/i,'').replace(/\s*(EDT|EDP|EDC|PARFUM)\b.*/i,'').trim()}

let activeFilter='all', query='';

function aromaTag(a){const cls=AROMA_CLASS[a]||'fresco';return `<span class="tag tag-${cls}">${a}</span>`}
function tipoTag(t){if(t==='Árabe')return`<span class="tag tag-arabe">Árabe</span>`;if(t==='Lujo')return`<span class="tag tag-lujo">✦ Lujo</span>`;return''}

function render(){
  const q=query.toLowerCase();
  const filtered=DATA.filter((p,i)=>{
    const mq=!q||p.marca.toLowerCase().includes(q)||p.nombre.toLowerCase().includes(q)||p.aroma.toLowerCase().includes(q);
    const mf=activeFilter==='all'
      ||(activeFilter==='diario'&&p.ocasion==='Diario')
      ||(activeFilter==='verano'&&p.ocasion==='Verano')
      ||(activeFilter==='arabe'&&p.tipo==='Árabe')
      ||(activeFilter==='lujo'&&p.tipo==='Lujo')
      ||(activeFilter==='lt1000'&&p.precio<1000)
      ||(activeFilter==='1k2k'&&p.precio>=1000&&p.precio<2000)
      ||(activeFilter==='gt2000'&&p.precio>=2000)
      ||(activeFilter==='noche'&&p.ocasion==='Noche')
      ||(activeFilter==='invierno'&&p.ocasion==='Invierno');
    return mq&&mf;
  });
  document.getElementById('cnt').textContent=filtered.length;
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  if(!filtered.length){grid.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  grid.innerHTML=filtered.map((p)=>{
    const idx=DATA.indexOf(p);
    const badge=p.ml||p.concentracion?`<div class="card-ml">${[p.concentracion,p.ml].filter(Boolean).join(' · ')}</div>`:'';
    return `<div class="card" style="animation-delay:0s" onclick="openModal(${idx})">
      <div class="card-img">
        <div class="card-img-placeholder">
          <div class="card-img-initials">${initials(p.marca)}</div>
          <div class="card-img-sub">${p.concentracion||'SET'}</div>
        </div>
        ${p.foto?`<img src="fotos/${p.foto}.jpg" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none'">`:''}
      </div>
      <div class="card-body">
        <div class="card-marca">${p.marca}</div>
        <div class="card-nombre">${cleanName(p.nombre)}</div>
        <div class="card-tags">${aromaTag(p.aroma)}${tipoTag(p.tipo)}</div>
        <div class="card-footer">
          <div><div class="card-price">${fmt(p.precio)}</div><div class="card-price-sub">MXN</div></div>
          ${badge}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderFeatured(){
  const scroll=document.getElementById('featured-scroll');
  if(!scroll)return;
  scroll.innerHTML=FEATURED.map(i=>{
    const p=DATA[i];
    const init=initials(p.marca);
    return `<div class="feat-card" onclick="openModal(${i})">
      <div class="feat-img">
        <div class="feat-initials">${init}</div>
        ${p.foto?`<img src="fotos/${p.foto}.jpg" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none'">`:''}
      </div>
      <div class="feat-body">
        <div class="feat-marca">${p.marca}</div>
        <div class="feat-nombre">${cleanName(p.nombre)}</div>
        <div class="feat-price">${fmt(p.precio)}</div>
      </div>
    </div>`;
  }).join('');
}

function openModal(idx){
  const p=DATA[idx];
  const imgTag=document.getElementById('m-img-tag');
  imgTag.src=`fotos/${p.foto}.jpg`;
  imgTag.alt=p.marca;
  imgTag.onerror=()=>{document.getElementById('m-img').style.display='none'};
  document.getElementById('m-img').style.display='flex';
  document.getElementById('m-marca').textContent=p.marca;
  document.getElementById('m-nombre').textContent=cleanName(p.nombre);
  document.getElementById('m-version').textContent=[[p.concentracion,p.ml].filter(Boolean).join(' · '),p.ocasion].filter(Boolean).join('  ·  ');
  document.getElementById('m-tags').innerHTML=aromaTag(p.aroma)+tipoTag(p.tipo);
  document.getElementById('m-price').textContent=fmt(p.precio);
  const msg=encodeURIComponent(`Hola, vi el catálogo de Sillage y me interesa: ${cleanName(p.nombre)} (${p.marca}) — ${fmt(p.precio)} MXN`);
  document.getElementById('m-wa').href=`https://wa.me/524777224550?text=${msg}`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

document.getElementById('search').addEventListener('input',e=>{query=e.target.value;render()});
document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.f;
    render();
  });
});

document.addEventListener("DOMContentLoaded", function(){
  render();
  renderFeatured();
});
</script>
</body>
</html>
